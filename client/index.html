<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Joker Poker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- SCREEN: Lobby Entry -->
  <div id="screen-lobby" class="screen active">
    <div class="lobby-wrap">
      <h1 class="logo">🃏 Joker Poker</h1>
      <div class="card-box">
        <label>Your Name</label>
        <input id="input-name" type="text" maxlength="20" placeholder="Enter name" autocomplete="off" />
        <label>Lobby Code <span class="hint">(leave blank to create)</span></label>
        <input id="input-code" type="text" maxlength="6" placeholder="XXXXXX" autocomplete="off"
               style="text-transform:uppercase;letter-spacing:0.2em" />
        <button id="btn-join" class="btn-primary">Join / Create</button>
        <div id="lobby-error" class="error hidden"></div>
      </div>
    </div>
  </div>

  <!-- SCREEN: Waiting Room -->
  <div id="screen-waiting" class="screen">
    <div class="waiting-wrap">
      <h2>Waiting Room</h2>
      <div class="code-display">
        Code: <span id="waiting-code"></span>
        <button class="btn-copy" id="btn-copy-code" title="Copy">⎘</button>
      </div>
      <ul id="player-list"></ul>
      <button id="btn-ready" class="btn-primary">Ready</button>
      <p id="waiting-status" class="status-text"></p>
    </div>
  </div>

  <!-- SCREEN: Commit Phase -->
  <div id="screen-commit" class="screen">
    <div class="commit-wrap">
      <h2>Arm Your Jokers</h2>
      <p class="status-text">Select which jokers to arm for this hand. Opponents see the count, not the type.<br>Armed jokers are spent whether played or not.</p>
      <div id="commit-joker-list" class="joker-list"></div>
      <button id="btn-commit" class="btn-primary">Commit (<span id="commit-count">0</span> armed)</button>
      <div id="commit-timer-bar" class="timer-bar"><div id="commit-timer-fill" class="timer-fill"></div></div>
      <p id="commit-waiting" class="status-text hidden"></p>
    </div>
  </div>

  <!-- SCREEN: Game Table -->
  <div id="screen-game" class="screen">
    <div class="table-wrap">

      <!-- Opponents (top) -->
      <div id="opponents" class="opponents-row"></div>

      <!-- Community cards + pot -->
      <div class="community-area">
        <div id="pot-display" class="pot-display"></div>
        <div id="community-cards" class="card-row"></div>
        <div id="phase-label" class="phase-label"></div>
      </div>

      <!-- My hole cards -->
      <div id="my-cards" class="my-cards-area">
        <div id="hole-cards" class="card-row"></div>
      </div>

      <!-- Joker hand (always visible during game) -->
      <div id="joker-hand-area" class="joker-hand-area hidden">
        <div id="joker-hand-list" class="joker-hand-list"></div>
      </div>

      <!-- Action controls -->
      <div id="action-area" class="action-area hidden">
        <div class="action-info">
          <span id="action-bet-to-call"></span>
        </div>
        <div class="action-buttons">
          <button id="btn-fold"  class="btn-action btn-fold">Fold</button>
          <button id="btn-check" class="btn-action btn-check">Check</button>
          <button id="btn-call"  class="btn-action btn-call">Call</button>
          <div class="raise-row">
            <input id="raise-amount" type="number" min="0" step="1" placeholder="Amount" />
            <button id="btn-raise" class="btn-action btn-raise">Raise</button>
          </div>
        </div>
        <!-- Play joker: only shown when it's your turn and you have committed jokers -->
        <div id="play-joker-area" class="play-joker-area hidden">
          <div id="committed-joker-list" class="joker-hand-list"></div>
        </div>
      </div>

      <!-- Showdown result banner -->
      <div id="showdown-banner" class="showdown-banner hidden"></div>

    </div>
  </div>

  <script src="app.js" type="module"></script>
</body>
</html>
